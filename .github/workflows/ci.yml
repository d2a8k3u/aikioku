name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'apps/server/**'
              - '.github/workflows/ci.yml'
            frontend:
              - 'apps/dashboard/**'
              - '.github/workflows/ci.yml'

  backend:
    name: Backend (server)
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: apps/server/pyproject.toml
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check src/ tests/
      - name: Ruff format check
        run: ruff format --check src/ tests/
      - name: Mypy (strict)
        run: mypy src/
      - name: Pytest (unit)
        run: pytest

  frontend:
    name: Frontend (dashboard)
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/dashboard/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: ESLint
        run: npm run lint
      - name: Prettier check
        run: npm run format:check
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Unit tests
        run: npm test
      - name: Build
        run: npm run build

  ci-success:
    name: ci-success
    if: ${{ always() }}
    needs: [changes, backend, frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Verify required jobs
        run: |
          echo "changes=${{ needs.changes.result }}"
          echo "backend=${{ needs.backend.result }}"
          echo "frontend=${{ needs.frontend.result }}"
          if [ "${{ needs.changes.result }}" = "failure" ] || \
             [ "${{ needs.backend.result }}" = "failure" ] || \
             [ "${{ needs.backend.result }}" = "cancelled" ] || \
             [ "${{ needs.frontend.result }}" = "failure" ] || \
             [ "${{ needs.frontend.result }}" = "cancelled" ]; then
            echo "::error::A required job failed."
            exit 1
          fi
          echo "All required jobs passed or were skipped."
